<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Report Status - Green Justice</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="gj-header">
      <div class="gj-logo">Green<span>Justice</span></div>
      <nav>
        <a href="index.html">Home</a>
        <a href="user.html">New report</a>
      </nav>
    </header>

    <main class="gj-main">
      <section class="card" style="max-width: 640px; margin: 1.5rem auto;">
        <h1 style="margin-top: 0;">Check your report status</h1>
        <p class="muted">
          Enter the tracking ID you received after submitting your report. You
          can view the status, but you cannot modify it.
        </p>

        <form id="status-form">
          <div class="field">
            <label for="tracking-id-input" class="field-label">Tracking ID</label>
            <input
              id="tracking-id-input"
              class="field-input"
              inputmode="numeric"
              placeholder="e.g. 12"
              required
            />
          </div>
          <button type="submit" class="btn primary full-width">
            Check status
          </button>
        </form>

        <div id="status-result" class="hidden" style="margin-top: 1rem;">
          <div class="field">
            <span class="field-label">Violation type</span>
            <div id="result-violation" style="font-weight: 700;"></div>
          </div>
          <div class="field">
            <span class="field-label">Current status</span>
            <div id="result-status" style="font-weight: 700;"></div>
          </div>
          <div class="field">
            <span class="field-label">Last updated</span>
            <div id="result-updated" class="muted"></div>
          </div>
        </div>

        <p id="status-message" class="form-message"></p>
      </section>
    </main>

    <footer class="gj-footer">
      <p>Green Justice &copy; <span id="year"></span></p>
    </footer>

    <script src="js/status.js"></script>
  </body>
</html>
